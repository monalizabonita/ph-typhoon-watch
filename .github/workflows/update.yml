name: Update typhoon status

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Fetch latest PAGASA status
        run: python3 scripts/update_status.py

      - name: Send alerts (typhoon + rain) to Google Chat
        env:
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
        run: python3 scripts/send_alerts.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data.json history.json alert_state.json; then
            git add data.json history.json alert_state.json
            git commit -m "Update typhoon status"
            git push
          else
            echo "No change in status."
          fi
